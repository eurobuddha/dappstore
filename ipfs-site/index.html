<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PandaDapps on IPFS</title>
<style>

/* ═══════════════════════════════════════════════════════
   PANDADAPPS ON IPFS
   Retro arcade meets the interplanetary file system
   Adapted from pandadapps-site (PocketWeb front-end)
   ═══════════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap');

:root {
	--bg: #06060c;
	--bg-raised: #0c0c16;
	--bg-card: #0f0f1a;
	--bg-card-hover: #141422;
	--border: #1a1a2e;
	--border-glow: #00ff8840;
	--text: #b8b8c8;
	--text-strong: #e8e8f0;
	--text-dim: #4a4a5e;
	--neon-green: #00ff88;
	--neon-green-dim: #00ff8830;
	--neon-pink: #ff3366;
	--neon-pink-dim: #ff336630;
	--neon-cyan: #00ccff;
	--neon-cyan-dim: #00ccff25;
	--neon-orange: #ff7b00;
	--neon-orange-dim: #ff7b0030;
	--neon-yellow: #ffcc00;
	--card-radius: 12px;
	--shadow: 0 4px 20px rgba(0,0,0,0.5);
	--accent: var(--neon-green);
	--accent-dim: var(--neon-green-dim);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

body {
	font-family: 'Outfit', system-ui, -apple-system, sans-serif;
	background: var(--bg);
	color: var(--text);
	min-height: 100vh;
	overflow-x: hidden;
	-webkit-font-smoothing: antialiased;
}

/* ═══ SCANLINE OVERLAY ═══ */
body::before {
	content: '';
	position: fixed;
	inset: 0;
	pointer-events: none;
	z-index: 9998;
	background: repeating-linear-gradient(
		0deg,
		transparent,
		transparent 2px,
		rgba(0,0,0,0.03) 2px,
		rgba(0,0,0,0.03) 4px
	);
}

/* ═══ GRID BACKGROUND ═══ */
.grid-bg {
	position: fixed;
	inset: 0;
	pointer-events: none;
	z-index: 0;
	background-image:
		linear-gradient(rgba(0,204,255,0.03) 1px, transparent 1px),
		linear-gradient(90deg, rgba(0,204,255,0.03) 1px, transparent 1px);
	background-size: 60px 60px;
}

/* ═══ GLOW ORBS ═══ */
.glow-orb {
	position: fixed;
	width: 500px;
	height: 500px;
	border-radius: 50%;
	filter: blur(120px);
	opacity: 0.07;
	pointer-events: none;
	z-index: 0;
}
.glow-orb-1 { top: -100px; right: -100px; background: var(--neon-green); }
.glow-orb-2 { bottom: -150px; left: -100px; background: var(--neon-pink); }

@keyframes fadeInUp {
	from { opacity: 0; transform: translateY(20px); }
	to   { opacity: 1; transform: translateY(0); }
}
@keyframes flicker {
	0%, 100% { opacity: 1; }
	92% { opacity: 1; }
	93% { opacity: 0.6; }
	94% { opacity: 1; }
	97% { opacity: 0.8; }
	98% { opacity: 1; }
}
@keyframes pulse {
	0%, 100% { opacity: 0.4; }
	50% { opacity: 1; }
}
@keyframes cardIn {
	from { opacity: 0; transform: scale(0.92) translateY(18px); }
	to   { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes loadSlide {
	0%   { transform: translateX(-100%); }
	100% { transform: translateX(350%); }
}

/* ═══ HEADER ═══ */
.header {
	position: relative;
	z-index: 10;
	text-align: center;
	padding: 48px 24px 24px;
	animation: fadeInUp 0.6s ease-out;
}

.header-title {
	font-family: 'Press Start 2P', monospace;
	font-size: clamp(20px, 5vw, 36px);
	color: var(--neon-green);
	text-shadow:
		0 0 10px var(--neon-green-dim),
		0 0 40px var(--neon-green-dim);
	letter-spacing: 3px;
	animation: flicker 4s infinite;
	margin-bottom: 12px;
}

.header-sub {
	font-family: 'JetBrains Mono', monospace;
	font-size: 13px;
	color: var(--text-dim);
	letter-spacing: 2px;
	text-transform: uppercase;
}
.header-sub .accent { color: var(--neon-cyan); }

.header-stats {
	display: inline-flex;
	align-items: center;
	gap: 8px;
	margin-top: 16px;
	padding: 6px 16px;
	border: 1px solid var(--border);
	border-radius: 100px;
	font-family: 'JetBrains Mono', monospace;
	font-size: 11px;
	color: var(--text-dim);
	background: var(--bg-raised);
}
.header-stats .dot {
	width: 6px;
	height: 6px;
	border-radius: 50%;
	background: var(--neon-green);
	box-shadow: 0 0 6px var(--neon-green);
	animation: pulse 2s infinite;
}

/* ═══ TABS ═══ */
.tabs {
	position: relative;
	z-index: 10;
	display: flex;
	justify-content: center;
	gap: 8px;
	padding: 12px 16px 28px;
	flex-wrap: wrap;
}
.tab {
	font-family: 'JetBrains Mono', monospace;
	font-size: 11px;
	font-weight: 600;
	letter-spacing: 1.5px;
	text-transform: uppercase;
	padding: 10px 20px;
	background: var(--bg-raised);
	color: var(--text-dim);
	border: 1px solid var(--border);
	border-radius: 100px;
	cursor: pointer;
	transition: all 0.2s;
}
.tab:hover { color: var(--text-strong); border-color: var(--border-glow); }
.tab.active {
	color: #000;
	background: var(--accent);
	border-color: var(--accent);
	box-shadow: 0 0 18px var(--accent-dim);
}

/* ═══ LOADING / ERROR ═══ */
.loading {
	text-align: center;
	padding: 80px 24px;
	animation: fadeInUp 0.4s ease-out;
}
.loading-text {
	font-family: 'Press Start 2P', monospace;
	font-size: 11px;
	color: var(--neon-green);
	letter-spacing: 2px;
	animation: pulse 1.5s infinite;
}
.loading-bar {
	width: 200px;
	height: 3px;
	margin: 20px auto 0;
	background: var(--border);
	border-radius: 2px;
	overflow: hidden;
}
.loading-bar::after {
	content: '';
	display: block;
	width: 40%;
	height: 100%;
	background: var(--neon-green);
	border-radius: 2px;
	animation: loadSlide 1.2s infinite ease-in-out;
}

.error {
	text-align: center;
	padding: 60px 24px;
	animation: fadeInUp 0.4s ease-out;
}
.error-icon { font-size: 32px; margin-bottom: 16px; }
.error-text {
	font-family: 'JetBrains Mono', monospace;
	font-size: 13px;
	color: var(--neon-pink);
	margin-bottom: 20px;
}
.retry-btn {
	font-family: 'JetBrains Mono', monospace;
	font-size: 12px;
	padding: 10px 24px;
	background: transparent;
	color: var(--neon-cyan);
	border: 1px solid var(--neon-cyan);
	border-radius: 6px;
	cursor: pointer;
	transition: all 0.2s;
}
.retry-btn:hover { background: var(--neon-cyan-dim); }

/* ═══ GRID + CARDS ═══ */
.dapp-grid {
	position: relative;
	z-index: 10;
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
	gap: 16px;
	padding: 0 24px 60px;
	max-width: 1100px;
	margin: 0 auto;
}

.dapp-card {
	background: var(--bg-card);
	border: 1px solid var(--border);
	border-radius: var(--card-radius);
	padding: 20px;
	transition: all 0.25s ease;
	animation: cardIn 0.5s ease-out both;
	position: relative;
	overflow: hidden;
	display: flex;
	flex-direction: column;
}
.dapp-card::before {
	content: '';
	position: absolute;
	top: 0; left: 0; right: 0;
	height: 2px;
	background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
	opacity: 0;
	transition: opacity 0.3s;
}
.dapp-card:hover {
	border-color: var(--border-glow);
	background: var(--bg-card-hover);
	box-shadow: 0 0 20px rgba(0,255,136,0.05), var(--shadow);
	transform: translateY(-2px);
}
.dapp-card:hover::before { opacity: 1; }

.dapp-top {
	display: flex;
	align-items: flex-start;
	gap: 14px;
	margin-bottom: 14px;
}
.dapp-icon-wrap {
	width: 52px;
	height: 52px;
	min-width: 52px;
	border-radius: 10px;
	overflow: hidden;
	border: 1px solid var(--border);
	background: var(--bg-raised);
	display: flex;
	align-items: center;
	justify-content: center;
}
.dapp-icon-wrap img { width: 100%; height: 100%; object-fit: cover; }
.dapp-icon-letter {
	font-family: 'Press Start 2P', monospace;
	font-size: 16px;
	color: var(--text-dim);
}
.dapp-meta { flex: 1; min-width: 0; }
.dapp-name {
	font-family: 'JetBrains Mono', monospace;
	font-size: 15px;
	font-weight: 600;
	color: var(--text-strong);
	margin-bottom: 4px;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
}
.dapp-version {
	font-family: 'JetBrains Mono', monospace;
	font-size: 11px;
	color: var(--text-dim);
}
.dapp-badge {
	display: inline-block;
	margin-left: 8px;
	padding: 1px 8px;
	border: 1px solid var(--border);
	border-radius: 100px;
	font-size: 10px;
	color: var(--text-dim);
}
.dapp-desc {
	font-size: 13px;
	line-height: 1.5;
	color: var(--text);
	margin-bottom: 16px;
	display: -webkit-box;
	-webkit-line-clamp: 3;
	-webkit-box-orient: vertical;
	overflow: hidden;
	flex: 1;
}
.dapp-hash {
	font-family: 'JetBrains Mono', monospace;
	font-size: 9px;
	color: var(--text-dim);
	margin-bottom: 10px;
	word-break: break-all;
}

/* ═══ BUTTONS ═══ */
.btn {
	display: block;
	width: 100%;
	padding: 10px 16px;
	border: none;
	border-radius: 8px;
	font-family: 'JetBrains Mono', monospace;
	font-size: 11px;
	font-weight: 600;
	letter-spacing: 1.5px;
	text-transform: uppercase;
	cursor: pointer;
	transition: all 0.2s;
	text-align: center;
	text-decoration: none;
}
.btn-download {
	background: linear-gradient(135deg, var(--neon-green), #00cc6a);
	color: #000;
	box-shadow: 0 0 15px var(--neon-green-dim);
}
.btn-download:hover {
	box-shadow: 0 0 25px var(--neon-green-dim), 0 0 50px rgba(0,255,136,0.1);
	transform: translateY(-1px);
}
.btn-download:active { transform: translateY(0); }
.btn-ext {
	background: transparent;
	color: var(--neon-cyan);
	border: 1px solid var(--neon-cyan-dim);
}
.btn-ext:hover { background: var(--neon-cyan-dim); }

/* ═══ FOOTER ═══ */
.footer {
	position: relative;
	z-index: 10;
	text-align: center;
	padding: 24px;
	font-family: 'JetBrains Mono', monospace;
	font-size: 10px;
	color: var(--text-dim);
	letter-spacing: 1px;
	line-height: 2;
}
.footer a { color: var(--neon-cyan); text-decoration: none; }

@media (max-width: 640px) {
	.header { padding: 32px 16px 16px; }
	.dapp-grid { padding: 0 16px 48px; gap: 12px; grid-template-columns: 1fr; }
	.dapp-card { padding: 16px; }
	.header-title { letter-spacing: 1px; }
}

</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="glow-orb glow-orb-1"></div>
<div class="glow-orb glow-orb-2"></div>

<header class="header">
	<h1 class="header-title">PANDADAPPS</h1>
	<p class="header-sub">Minima store on <span class="accent">IPFS</span> &mdash; permanently addressable</p>
	<div class="header-stats" id="stats" style="display:none;">
		<span class="dot"></span>
		<span id="stats-text"></span>
	</div>
</header>

<nav class="tabs" id="tabs"></nav>

<div id="content">
	<div class="loading">
		<div class="loading-text">LOADING CATALOG</div>
		<div class="loading-bar"></div>
	</div>
</div>

<div class="footer">
	PANDADAPPS &middot; MIRRORED ON <a href="https://eurobuddha.com/pandadapps.json">EUROBUDDHA.COM</a>
	&middot; <a href="https://store.eurobuddha.com/pandadapps.json">STORE MIRROR</a>
	&middot; <a href="https://minidapps.minima.global">MINIDAPPS.MINIMA.GLOBAL</a><br>
	THIS SNAPSHOT IS CONTENT-ADDRESSED &mdash; SERVED VIA /ipns/ipfs.eurobuddha.com
</div>

<script>

/* ═══════════════════════════════════════════════════════
   All catalog paths are relative to the snapshot root, so
   this page works identically at ipfs.eurobuddha.com, any
   public gateway /ipns/ path, or a raw /ipfs/<CID>/ path.
   ═══════════════════════════════════════════════════════ */

var TABS = [
	{ id: 'panda',    label: 'PandaDapps',     src: 'pandadapps.json',        key: 'dapps',
	  accent: '#00ff88', accentDim: '#00ff8830', note: 'MiniDapps — install via MiniHub' },
	{ id: 'official', label: 'Minima Official', src: 'store/minimadapps.json', key: 'dapps',
	  accent: '#ff7b00', accentDim: '#ff7b0030', note: 'Official MiniDapps mirror' },
	{ id: 'apks',     label: 'Android APKs',   src: 'apks/apks.json',         key: 'apps',
	  accent: '#00ccff', accentDim: '#00ccff25', note: 'Native minimaCore apps — sideload' }
];

var COLORS = [
	"#00ff88","#ff3366","#00ccff","#ffcc00","#a855f7",
	"#ff7b54","#14b8a6","#ec4899","#6e8ef7","#84cc16",
	"#f97316","#06b6d4","#d946ef","#ef4444","#8b5cf6"
];

var CACHE = {};      // tab id -> item array
var ACTIVE = 'panda';

/* ═══ INIT ═══ */
renderTabs();
selectTab('panda');

function renderTabs(){
	var html = '';
	for(var i = 0; i < TABS.length; i++){
		var t = TABS[i];
		html += '<button class="tab' + (t.id === ACTIVE ? ' active' : '') + '" id="tab-' + t.id +
			'" onclick="selectTab(\'' + t.id + '\')">' + t.label + '</button>';
	}
	document.getElementById('tabs').innerHTML = html;
}

function tabDef(id){
	for(var i = 0; i < TABS.length; i++) if(TABS[i].id === id) return TABS[i];
	return TABS[0];
}

function selectTab(id){
	ACTIVE = id;
	var t = tabDef(id);
	document.documentElement.style.setProperty('--accent', t.accent);
	document.documentElement.style.setProperty('--accent-dim', t.accentDim);
	renderTabs();

	if(CACHE[id]){ render(); return; }

	document.getElementById('content').innerHTML =
		'<div class="loading"><div class="loading-text">LOADING CATALOG</div><div class="loading-bar"></div></div>';

	fetch(t.src)
		.then(function(r){ if(!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
		.then(function(data){
			CACHE[id] = data[t.key] || [];
			if(ACTIVE === id) render();
		})
		.catch(function(e){
			if(ACTIVE !== id) return;
			document.getElementById('content').innerHTML =
				'<div class="error">' +
					'<div class="error-icon">:/</div>' +
					'<div class="error-text">Could not load catalog (' + escHtml(e.message) + ')</div>' +
					'<button class="retry-btn" onclick="selectTab(\'' + id + '\')">RETRY</button>' +
				'</div>';
		});
}

/* minimadapps.json quirk: description is string OR array of strings */
function normDesc(d){
	if(Array.isArray(d)) d = d.join(' ');
	return d || '';
}

function render(){
	var t = tabDef(ACTIVE);
	var items = CACHE[ACTIVE] || [];

	var stats = document.getElementById('stats');
	stats.style.display = 'inline-flex';
	document.getElementById('stats-text').textContent =
		items.length + (t.key === 'apps' ? ' native apps' : ' dapps') + ' · ' + t.note;

	var html = '<div class="dapp-grid">';
	for(var i = 0; i < items.length; i++){
		var it = items[i];
		var name = it.name || 'unknown';
		var delay = (Math.min(i, 20) * 50) + 'ms';
		var color = COLORS[i % COLORS.length];
		var isRemote = /^https?:\/\//.test(it.file || '');
		var fileName = (it.file || '').split('/').pop();

		var btn;
		if(!it.file){
			btn = '';
		} else if(isRemote){
			btn = '<a class="btn btn-ext" href="' + escAttr(it.file) + '" target="_blank" rel="noopener">External download</a>';
		} else {
			btn = '<a class="btn btn-download" href="' + escAttr(it.file) + '" download="' + escAttr(fileName) + '">Download</a>';
		}

		var badge = '';
		if(it.category) badge = '<span class="dapp-badge">' + escHtml(it.category) + '</span>';

		var hash = '';
		if(it.sha256) hash = '<div class="dapp-hash">sha256 ' + escHtml(it.sha256) + '</div>';

		html += '<div class="dapp-card" style="animation-delay:' + delay + '">' +
			'<div class="dapp-top">' +
				'<div class="dapp-icon-wrap" id="icon-wrap-' + i + '">' +
					'<span class="dapp-icon-letter" style="color:' + color + '">' + escHtml(name.charAt(0).toUpperCase()) + '</span>' +
				'</div>' +
				'<div class="dapp-meta">' +
					'<div class="dapp-name">' + escHtml(name) + '</div>' +
					'<div class="dapp-version">v' + escHtml(it.version || '?') + badge + '</div>' +
				'</div>' +
			'</div>' +
			'<div class="dapp-desc">' + escHtml(normDesc(it.description)) + '</div>' +
			hash + btn +
		'</div>';
	}
	html += '</div>';
	document.getElementById('content').innerHTML = html;

	for(var j = 0; j < items.length; j++){
		if(items[j].icon) loadIcon(j, items[j].icon);
	}
}

function loadIcon(idx, url){
	var wrap = document.getElementById('icon-wrap-' + idx);
	if(!wrap) return;
	var img = new Image();
	img.onload = function(){ wrap.innerHTML = ''; wrap.appendChild(img); };
	img.src = url;
}

function escHtml(str){
	var div = document.createElement('div');
	div.textContent = str == null ? '' : String(str);
	return div.innerHTML;
}
function escAttr(str){
	return String(str).replace(/"/g, '&quot;');
}

</script>
</body>
</html>
