<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnyDappStore</title>
<style>

/* ═══════════════════════════════════════════════════════
   ANYDAPPSTORE — Universal MiniDapp installer
   ═══════════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap');

:root {
	--bg: #06060c;
	--bg-raised: #0c0c16;
	--bg-card: #0f0f1a;
	--bg-card-hover: #141422;
	--border: #1a1a2e;
	--border-glow: #00ff8840;
	--text: #b8b8c8;
	--text-strong: #e8e8f0;
	--text-dim: #4a4a5e;
	--neon-green: #00ff88;
	--neon-green-dim: #00ff8830;
	--neon-pink: #ff3366;
	--neon-pink-dim: #ff336630;
	--neon-cyan: #00ccff;
	--neon-cyan-dim: #00ccff25;
	--neon-yellow: #ffcc00;
	--card-radius: 12px;
	--shadow: 0 4px 20px rgba(0,0,0,0.5);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

body {
	font-family: 'Outfit', system-ui, -apple-system, sans-serif;
	background: var(--bg);
	color: var(--text);
	min-height: 100vh;
	overflow-x: hidden;
	-webkit-font-smoothing: antialiased;
}

/* ═══ SCANLINE OVERLAY ═══ */
body::before {
	content: '';
	position: fixed;
	inset: 0;
	pointer-events: none;
	z-index: 9998;
	background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
}

/* ═══ NOISE GRAIN ═══ */
body::after {
	content: '';
	position: fixed;
	inset: 0;
	pointer-events: none;
	opacity: 0.02;
	z-index: 9999;
	background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ═══ GRID BACKGROUND ═══ */
.grid-bg {
	position: fixed;
	inset: 0;
	pointer-events: none;
	z-index: 0;
	background-image:
		linear-gradient(rgba(0,204,255,0.03) 1px, transparent 1px),
		linear-gradient(90deg, rgba(0,204,255,0.03) 1px, transparent 1px);
	background-size: 60px 60px;
}

.glow-orb { position: fixed; width: 500px; height: 500px; border-radius: 50%; filter: blur(120px); opacity: 0.07; pointer-events: none; z-index: 0; }
.glow-orb-1 { top: -100px; right: -100px; background: var(--neon-cyan); }
.glow-orb-2 { bottom: -150px; left: -100px; background: var(--neon-pink); }

/* ═══ ANIMATIONS ═══ */
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes flicker { 0%,100% { opacity: 1; } 92% { opacity: 1; } 93% { opacity: 0.6; } 94% { opacity: 1; } 97% { opacity: 0.8; } 98% { opacity: 1; } }
@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes cardIn { from { opacity: 0; transform: scale(0.92) translateY(18px); } to { opacity: 1; transform: scale(1) translateY(0); } }
@keyframes glowPulse { 0%,100% { box-shadow: 0 0 15px var(--neon-green-dim), inset 0 0 15px var(--neon-green-dim); } 50% { box-shadow: 0 0 25px var(--neon-green-dim), inset 0 0 25px var(--neon-green-dim); } }
@keyframes loadSlide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }

/* ═══ HEADER ═══ */
.header {
	position: relative; z-index: 10; text-align: center;
	padding: 48px 24px 24px; animation: fadeInUp 0.6s ease-out;
}
.header-title {
	font-family: 'Press Start 2P', monospace;
	font-size: clamp(16px, 4.5vw, 28px);
	color: var(--neon-cyan);
	text-shadow: 0 0 10px var(--neon-cyan-dim), 0 0 40px var(--neon-cyan-dim);
	letter-spacing: 2px;
	animation: flicker 4s infinite;
	margin-bottom: 12px;
}
.header-sub {
	font-family: 'JetBrains Mono', monospace;
	font-size: 12px; color: var(--text-dim);
	letter-spacing: 1.5px; text-transform: uppercase;
	max-width: 440px; margin: 0 auto;
}

/* ═══ URL BAR ═══ */
.url-bar {
	position: relative; z-index: 10;
	max-width: 640px; margin: 24px auto 12px;
	padding: 0 24px; display: flex; gap: 8px;
}
.url-input {
	flex: 1; padding: 12px 14px;
	background: var(--bg-card); border: 1px solid var(--border);
	border-radius: 8px; color: var(--text-strong);
	font-family: 'JetBrains Mono', monospace; font-size: 12px;
	outline: none; transition: border-color 0.2s;
}
.url-input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 12px var(--neon-cyan-dim); }
.url-input::placeholder { color: var(--text-dim); }
.url-btn {
	padding: 12px 20px;
	background: linear-gradient(135deg, var(--neon-cyan), #0099cc);
	border: none; border-radius: 8px;
	color: #000; font-family: 'JetBrains Mono', monospace;
	font-size: 11px; font-weight: 700;
	letter-spacing: 1.5px; text-transform: uppercase;
	cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.url-btn:hover { box-shadow: 0 0 20px var(--neon-cyan-dim); transform: translateY(-1px); }

/* ═══ STORE NAME ═══ */
.store-name {
	position: relative; z-index: 10; text-align: center;
	padding: 8px 24px;
	font-family: 'Press Start 2P', monospace;
	font-size: 13px; color: var(--neon-green);
	text-shadow: 0 0 8px var(--neon-green-dim);
	letter-spacing: 1px; display: none;
}
.store-desc {
	position: relative; z-index: 10; text-align: center;
	padding: 0 24px 16px;
	font-family: 'JetBrains Mono', monospace;
	font-size: 11px; color: var(--text-dim); display: none;
}

/* ═══ STATS ═══ */
.header-stats {
	display: inline-flex; align-items: center; gap: 8px;
	margin-top: 16px; padding: 6px 16px;
	border: 1px solid var(--border); border-radius: 100px;
	font-family: 'JetBrains Mono', monospace; font-size: 11px;
	color: var(--text-dim); background: var(--bg-raised);
}
.header-stats .dot {
	width: 6px; height: 6px; border-radius: 50%;
	background: var(--neon-green); box-shadow: 0 0 6px var(--neon-green);
	animation: pulse 2s infinite;
}

/* ═══ LOADING / ERROR ═══ */
.loading { text-align: center; padding: 80px 24px; animation: fadeInUp 0.4s ease-out; }
.loading-text { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--neon-cyan); letter-spacing: 2px; animation: pulse 1.5s infinite; }
.loading-bar { width: 200px; height: 3px; margin: 20px auto 0; background: var(--border); border-radius: 2px; overflow: hidden; }
.loading-bar::after { content: ''; display: block; width: 40%; height: 100%; background: var(--neon-cyan); border-radius: 2px; animation: loadSlide 1.2s infinite ease-in-out; }

.welcome { text-align: center; padding: 60px 24px; animation: fadeInUp 0.4s ease-out; }
.welcome-text { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-dim); line-height: 1.8; }

.error { text-align: center; padding: 60px 24px; animation: fadeInUp 0.4s ease-out; }
.error-icon { font-size: 32px; margin-bottom: 16px; }
.error-text { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--neon-pink); margin-bottom: 20px; }
.retry-btn { font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 10px 24px; background: transparent; color: var(--neon-cyan); border: 1px solid var(--neon-cyan); border-radius: 6px; cursor: pointer; transition: all 0.2s; }
.retry-btn:hover { background: var(--neon-cyan-dim); }

/* ═══ DAPP GRID ═══ */
.dapp-grid { position: relative; z-index: 10; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; padding: 0 24px 60px; max-width: 1100px; margin: 0 auto; }

/* ═══ DAPP CARD ═══ */
.dapp-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--card-radius); padding: 20px; transition: all 0.25s ease; animation: cardIn 0.5s ease-out both; position: relative; overflow: hidden; }
.dapp-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--neon-green-dim), transparent); opacity: 0; transition: opacity 0.3s; }
.dapp-card:hover { border-color: var(--border-glow); background: var(--bg-card-hover); box-shadow: 0 0 20px rgba(0,255,136,0.05), var(--shadow); transform: translateY(-2px); }
.dapp-card:hover::before { opacity: 1; }

.dapp-top { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
.dapp-icon-wrap { width: 52px; height: 52px; min-width: 52px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); background: var(--bg-raised); display: flex; align-items: center; justify-content: center; }
.dapp-icon-wrap img { width: 100%; height: 100%; object-fit: cover; }
.dapp-icon-letter { font-family: 'Press Start 2P', monospace; font-size: 16px; color: var(--text-dim); }
.dapp-meta { flex: 1; min-width: 0; }
.dapp-name { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; color: var(--text-strong); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dapp-version { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }
.dapp-desc { font-size: 13px; line-height: 1.5; color: var(--text); margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* ═══ BUTTONS ═══ */
.btn { display: block; width: 100%; padding: 10px 16px; border: none; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; text-align: center; }
.btn-install { background: linear-gradient(135deg, var(--neon-green), #00cc6a); color: #000; box-shadow: 0 0 15px var(--neon-green-dim); }
.btn-install:hover { box-shadow: 0 0 25px var(--neon-green-dim), 0 0 50px rgba(0,255,136,0.1); transform: translateY(-1px); }
.btn-update { background: linear-gradient(135deg, var(--neon-pink), #cc2952); color: #fff; box-shadow: 0 0 15px var(--neon-pink-dim); }
.btn-update:hover { box-shadow: 0 0 25px var(--neon-pink-dim); transform: translateY(-1px); }
.btn-installed { background: transparent; color: var(--neon-green); border: 1px solid var(--neon-green-dim); cursor: default; opacity: 0.7; }
.btn-installing { background: var(--bg-raised); color: var(--neon-cyan); border: 1px solid var(--neon-cyan-dim); cursor: wait; animation: glowPulse 2s infinite; }
.btn-installing .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--neon-cyan-dim); border-top-color: var(--neon-cyan); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
.btn:disabled { pointer-events: none; opacity: 0.5; }

/* ═══ TOAST ═══ */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); z-index: 10000; font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 12px 24px; border-radius: 8px; border: 1px solid; opacity: 0; transition: all 0.35s ease; pointer-events: none; max-width: 90vw; text-align: center; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: #0a1a10; color: var(--neon-green); border-color: var(--neon-green-dim); }
.toast.error { background: #1a0a10; color: var(--neon-pink); border-color: var(--neon-pink-dim); }

/* ═══ FOOTER ═══ */
.footer { position: relative; z-index: 10; text-align: center; padding: 24px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }
.footer a { color: var(--neon-cyan); text-decoration: none; }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 640px) {
	.header { padding: 32px 16px 16px; }
	.dapp-grid { padding: 0 16px 48px; gap: 12px; grid-template-columns: 1fr; }
	.dapp-card { padding: 16px; }
	.header-title { letter-spacing: 1px; }
	.url-bar { padding: 0 16px; }
}

</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="glow-orb glow-orb-1"></div>
<div class="glow-orb glow-orb-2"></div>

<header class="header">
	<h1 class="header-title">ANYDAPPSTORE</h1>
	<p class="header-sub">Paste any MiniDapp store JSON link to browse and install</p>
</header>

<div class="url-bar">
	<input class="url-input" id="urlInput" type="text" placeholder="https://example.com/store.json" value="" onkeydown="if(event.key==='Enter')loadCustomUrl()">
	<button class="url-btn" onclick="loadCustomUrl()">LOAD</button>
</div>

<div class="store-name" id="storeName"></div>
<div class="store-desc" id="storeDesc"></div>

<div id="statsWrap" style="text-align:center; position:relative; z-index:10;">
	<div class="header-stats" id="stats" style="display:none;">
		<span class="dot"></span>
		<span id="stats-text">0 dapps</span>
	</div>
</div>

<div id="content">
	<div class="welcome">
		<div class="welcome-text">
			Paste a dapp store JSON link above and hit LOAD<br>
			to browse and install MiniDapps to your node
		</div>
	</div>
</div>

<div class="toast" id="toast"></div>

<div class="footer">
	ANYDAPPSTORE &middot; POWERED BY <a href="javascript:void(0)" onclick="jumpToPocketWeb()">POCKETWEB</a> &middot; ON MINIMA
</div>

<script src="../../miniweb/miniweb.js"></script>
<script>

var CATALOG_URL = "";
var CATALOG     = [];
var INSTALLED   = [];
var INSTALLING  = false;
var STORE_NAME  = "";
var STORE_DESC  = "";

var COLORS = [
	"#00ff88","#ff3366","#00ccff","#ffcc00","#a855f7",
	"#ff7b54","#14b8a6","#ec4899","#6e8ef7","#84cc16",
	"#f97316","#06b6d4","#d946ef","#ef4444","#8b5cf6"
];

miniweb_Init();

function loadCustomUrl(){
	var input = document.getElementById('urlInput');
	var url = (input.value || '').trim();
	if(!url){
		showToast('Paste a JSON link first', 'error');
		return;
	}
	CATALOG_URL = url;
	document.getElementById('content').innerHTML =
		'<div class="loading"><div class="loading-text">LOADING CATALOG</div><div class="loading-bar"></div></div>';
	document.getElementById('storeName').style.display = 'none';
	document.getElementById('storeDesc').style.display = 'none';
	document.getElementById('stats').style.display = 'none';
	loadData();
}

function loadData(){
	var catalogDone = false;
	var installedDone = false;

	miniweb_NetGET(CATALOG_URL, function(resp){
		try {
			if(resp && resp.status && resp.response){
				var data = JSON.parse(resp.response);
				CATALOG = data.dapps || [];
				STORE_NAME = data.name || "";
				STORE_DESC = data.description || "";
			}
		} catch(e) {
			CATALOG = [];
			STORE_NAME = "";
			STORE_DESC = "";
		}
		catalogDone = true;
		if(installedDone) render();
	});

	miniweb_MdsCmd("mds", function(resp){
		try {
			if(resp && resp.status && resp.response && resp.response.minidapps){
				INSTALLED = resp.response.minidapps;
			}
		} catch(e) {
			INSTALLED = [];
		}
		installedDone = true;
		if(catalogDone) render();
	});
}

function compareSemver(v1, v2){
	var p1 = String(v1).split('.').map(Number);
	var p2 = String(v2).split('.').map(Number);
	var len = Math.max(p1.length, p2.length);
	for(var i = 0; i < len; i++){
		var a = p1[i] || 0;
		var b = p2[i] || 0;
		if(a < b) return -1;
		if(a > b) return 1;
	}
	return 0;
}

function findInstalled(name){
	for(var i = 0; i < INSTALLED.length; i++){
		if(INSTALLED[i].conf && INSTALLED[i].conf.name &&
			INSTALLED[i].conf.name.trim().toLowerCase() === name.trim().toLowerCase()){
			return INSTALLED[i];
		}
	}
	return null;
}

function render(){
	var content = document.getElementById('content');

	if(CATALOG.length === 0){
		content.innerHTML =
			'<div class="error">' +
				'<div class="error-icon">:/</div>' +
				'<div class="error-text">Could not load dapp catalog</div>' +
				'<button class="retry-btn" onclick="loadCustomUrl()">RETRY</button>' +
			'</div>';
		return;
	}

	// Show store name + description
	var storeNameEl = document.getElementById('storeName');
	var storeDescEl = document.getElementById('storeDesc');
	if(STORE_NAME){
		storeNameEl.textContent = STORE_NAME;
		storeNameEl.style.display = 'block';
	} else {
		storeNameEl.style.display = 'none';
	}
	if(STORE_DESC){
		storeDescEl.textContent = STORE_DESC;
		storeDescEl.style.display = 'block';
	} else {
		storeDescEl.style.display = 'none';
	}

	var stats = document.getElementById('stats');
	var statsText = document.getElementById('stats-text');
	stats.style.display = 'inline-flex';
	statsText.textContent = CATALOG.length + ' dapps available';

	var html = '<div class="dapp-grid">';

	for(var i = 0; i < CATALOG.length; i++){
		var dapp = CATALOG[i];
		var inst = findInstalled(dapp.name);
		var delay = (i * 60) + 'ms';
		var color = COLORS[i % COLORS.length];

		var btnHtml = '';
		if(inst){
			var cmp = compareSemver(inst.conf.version, dapp.version);
			if(cmp < 0){
				btnHtml = '<button class="btn btn-update" data-idx="' + i + '" onclick="installDapp(' + i + ')">UPDATE v' + dapp.version + '</button>';
			} else {
				btnHtml = '<div class="btn btn-installed">INSTALLED v' + inst.conf.version + '</div>';
			}
		} else {
			btnHtml = '<button class="btn btn-install" data-idx="' + i + '" onclick="installDapp(' + i + ')">INSTALL</button>';
		}

		html += '<div class="dapp-card" style="animation-delay:' + delay + '">' +
			'<div class="dapp-top">' +
				'<div class="dapp-icon-wrap" id="icon-wrap-' + i + '">' +
					'<span class="dapp-icon-letter" style="color:' + color + '">' + dapp.name.charAt(0).toUpperCase() + '</span>' +
				'</div>' +
				'<div class="dapp-meta">' +
					'<div class="dapp-name">' + escHtml(dapp.name) + '</div>' +
					'<div class="dapp-version">v' + escHtml(dapp.version) + '</div>' +
				'</div>' +
			'</div>' +
			'<div class="dapp-desc">' + escHtml(dapp.description) + '</div>' +
			btnHtml +
		'</div>';
	}

	html += '</div>';
	content.innerHTML = html;

	for(var j = 0; j < CATALOG.length; j++){
		if(CATALOG[j].icon) loadIcon(j, CATALOG[j].icon);
	}
}

function loadIcon(idx, url){
	var wrap = document.getElementById('icon-wrap-' + idx);
	if(!wrap) return;
	var img = new Image();
	img.onload = function(){ wrap.innerHTML = ''; wrap.appendChild(img); };
	img.onerror = function(){};
	img.src = url;
}

function installDapp(idx){
	if(INSTALLING) return;
	INSTALLING = true;

	var dapp = CATALOG[idx];
	var fileUrl = dapp.file.replace("http://", "https://");

	var btn = document.querySelector('[data-idx="' + idx + '"]');
	if(btn){
		btn.className = 'btn btn-installing';
		btn.disabled = true;
		btn.innerHTML = '<span class="spinner"></span>INSTALLING';
	}

	var allBtns = document.querySelectorAll('.btn-install, .btn-update');
	for(var i = 0; i < allBtns.length; i++) allBtns[i].disabled = true;

	miniweb_InstallDapp(fileUrl, dapp.name, function(result){
		INSTALLING = false;

		if(result && result.status){
			if(result.pending){
				showToast(dapp.name + ' sent to Pending — approve in Pending MiniDapp', 'success');
			} else {
				showToast(dapp.name + ' installed!', 'success');
			}
			miniweb_MdsCmd("mds", function(resp){
				try {
					if(resp && resp.status && resp.response && resp.response.minidapps){
						INSTALLED = resp.response.minidapps;
					}
				} catch(e){}
				render();
			});
		} else {
			var err = (result && result.error) || 'Unknown error';
			if(err === 'cancelled'){
				render();
			} else {
				showToast('Failed: ' + err, 'error');
				render();
			}
		}
	});
}

function showToast(message, type){
	var toast = document.getElementById('toast');
	toast.textContent = message;
	toast.className = 'toast ' + type + ' show';
	setTimeout(function(){ toast.className = 'toast ' + type; }, 3500);
}

function escHtml(str){
	var div = document.createElement('div');
	div.textContent = str || '';
	return div.innerHTML;
}

function jumpToPocketWeb(){
	miniweb_JumpToURL("miniweb://pocketweb");
}

</script>
</body>
</html>
